<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-10">
    <div class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-lg border border-gray-100">
        <div class="flex justify-between items-center">
            <label class="font-semibold text-gray-700 flex items-center gap-3">
                <div class="flex -space-x-2">
                    <div class="w-10 h-10 bg-gray-100 rounded-lg border flex items-center justify-center p-1 bg-white relative z-10">
                        <img src="images/icons/gliding.png" alt="Gliding" class="max-w-full max-h-full">
                    </div>
                    <div class="w-10 h-10 bg-gray-100 rounded-lg border flex items-center justify-center p-1 bg-white relative z-0">
                        <img src="images/icons/hung.png" alt="Hung" class="max-w-full max-h-full">
                    </div>
                </div>
                <div>
                    <span class="block text-sm font-bold text-gray-900 leading-tight">Sliders / Hung</span>
                    <span class="block text-xs text-gray-400 font-medium">Gliding or Double-Hung</span>
                </div>
            </label>
            <div class="flex items-center gap-3">
                <button class="w-8 h-8 bg-gray-200 rounded-full font-bold text-gray-600">-</button>
                <span class="text-xl font-bold text-gray-900 w-10 text-center">3</span>
                <button class="w-8 h-8 bg-gray-200 rounded-full font-bold text-gray-600">+</button>
            </div>
        </div>
        <p class="mt-4 text-xs text-gray-400 italic text-center">Preview of the Sliders row with both icons</p>
    </div>
</body>
</html>
